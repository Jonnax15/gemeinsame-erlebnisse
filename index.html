<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemeinsame Erlebnisse</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1d1b31,#302b63,#24243e);
    color:white;
    min-height:100vh;
    padding:25px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:38px;
    margin-bottom:5px;
}

.untertitel{
    text-align:center;
    color:#ddd;
    margin-bottom:30px;
}

.progress-box{
    background:rgba(255,255,255,.12);
    border-radius:20px;
    padding:20px;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.progress-text{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.progress-bg{
    background:rgba(255,255,255,.2);
    border-radius:999px;
    height:18px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff7eb3,#ff758c,#ffd36e);
    border-radius:999px;
    transition:.4s;
}

.erlebnis{
    background:rgba(255,255,255,.13);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:22px;
    margin-bottom:18px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.kopf{
    display:flex;
    align-items:center;
    gap:14px;
    padding:18px 20px;
    cursor:pointer;
}

.kopf:hover{
    background:rgba(255,255,255,.08);
}

.kopf span{
    font-size:20px;
    font-weight:bold;
}

input[type="checkbox"]{
    width:22px;
    height:22px;
    accent-color:#ff7eb3;
}

.pfeil{
    margin-left:auto;
    transition:.3s;
}

.details{
    display:none;
    padding:20px;
    border-top:1px solid rgba(255,255,255,.18);
}

.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:18px;
}

label{
    font-size:14px;
    color:#ddd;
}

input[type="date"],
input[type="text"],
input[type="file"]{
    width:100%;
    margin-top:6px;
    padding:12px;
    border:none;
    border-radius:12px;
    outline:none;
}

input[type="text"],
input[type="date"]{
    background:rgba(255,255,255,.9);
}

.upload-box{
    background:rgba(255,255,255,.1);
    border:2px dashed rgba(255,255,255,.35);
    border-radius:16px;
    padding:18px;
    margin-top:10px;
}

.bilder{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:18px;
}

.bild-container{
    position:relative;
}

.bild-container img{
    width:135px;
    height:135px;
    object-fit:cover;
    border-radius:16px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,.35);
    transition:.2s;
}

.bild-container img:hover{
    transform:scale(1.04);
}

.loeschen{
    position:absolute;
    top:7px;
    right:7px;
    background:#ff3b3b;
    color:white;
    border:none;
    border-radius:50%;
    width:26px;
    height:26px;
    cursor:pointer;
    font-size:18px;
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:20px;
}

.erledigt-text{
    opacity:.6;
    text-decoration:line-through;
}

@media(max-width:650px){
    .info-grid{
        grid-template-columns:1fr;
    }

    h1{
        font-size:30px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Unsere gemeinsamen Erlebnisse</h1>
    <p class="untertitel">Sammelt Erinnerungen, Orte, Bilder und besondere Momente.</p>

    <div class="progress-box">
        <div class="progress-text">
            <span>Fortschritt</span>
            <span id="progressText">0 von 0 erledigt</span>
        </div>
        <div class="progress-bg">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div id="liste"></div>

</div>

<div class="lightbox" id="lightbox">
    <img id="grossesBild">
</div>

<script>
const erlebnisse = [
    "In H√§ngematten schlafenрЯТ§",
    "Sterne beobachtenвЬ®",
    "WanderungрЯ•Њ",
    "FahrradtourрЯЪірЯПївАНвЩАпЄП",
    "Picknick auf dem MehlteuerрЯІЇ",
    "SkatenрЯЫЉ",
    "Sonnenuntergang & Sonnenaufgang sehenрЯМД",
    "Volleyball spielenрЯПР",
    "Andere Stadt besuchenрЯПЩпЄП",
    "SerienmarathonрЯОђ",
    "Playlist erstellenрЯОІ",
    "Marathon laufenрЯПГвАНвЩА",
];

const liste = document.getElementById("liste");

let daten = {};

async function speichern(){
    await fetch("/api/save", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(daten)
    });
}

async function laden(){
    try{
        const response = await fetch("/api/load");

        if(!response.ok){
            throw new Error("Laden fehlgeschlagen");
        }

        const serverDaten = await response.json();
        daten = serverDaten && typeof serverDaten === "object" ? serverDaten : {};
    }catch(error){
        console.log("Fehler beim Laden:", error);
        daten = {};
    }

    render();
}
function fortschrittAktualisieren(){
    const erledigt = erlebnisse.filter((_,index)=>daten[index]?.erledigt).length;
    const gesamt = erlebnisse.length;
    const prozent = gesamt === 0 ? 0 : (erledigt / gesamt) * 100;

    document.getElementById("progressText").textContent =
        erledigt + " von " + gesamt + " erledigt";

    document.getElementById("progressFill").style.width = prozent + "%";
}

function render(){
    liste.innerHTML = "";

    erlebnisse.forEach((name,index)=>{

        if(!daten[index]){
            daten[index] = {
                erledigt:false,
                bilder:[],
                datum:"",
                ort:""
            };
        }

        const box = document.createElement("div");
        box.className = "erlebnis";

        const kopf = document.createElement("div");
        kopf.className = "kopf";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = daten[index].erledigt;

        checkbox.addEventListener("click",(e)=>{
            e.stopPropagation();
            daten[index].erledigt = checkbox.checked;
            speichern();
            render();
        });

        const titel = document.createElement("span");
        titel.textContent = name;

        if(daten[index].erledigt){
            titel.classList.add("erledigt-text");
        }

        const pfeil = document.createElement("div");
        pfeil.className = "pfeil";
        pfeil.textContent = "вЦЉ";

        kopf.appendChild(checkbox);
        kopf.appendChild(titel);
        kopf.appendChild(pfeil);

        const details = document.createElement("div");
        details.className = "details";

        const infoGrid = document.createElement("div");
        infoGrid.className = "info-grid";

        const datumBox = document.createElement("div");
        const datumLabel = document.createElement("label");
        datumLabel.textContent = "Datum";

        const datumInput = document.createElement("input");
        datumInput.type = "date";
        datumInput.value = daten[index].datum || "";

        datumInput.onchange = ()=>{
            daten[index].datum = datumInput.value;
            speichern();
        };

        datumBox.appendChild(datumLabel);
        datumBox.appendChild(datumInput);

        const ortBox = document.createElement("div");
        const ortLabel = document.createElement("label");
        ortLabel.textContent = "Ort";

        const ortInput = document.createElement("input");
        ortInput.type = "text";
        ortInput.placeholder = "z. B. Berlin, Strand, Kino...";
        ortInput.value = daten[index].ort || "";

        ortInput.oninput = ()=>{
            daten[index].ort = ortInput.value;
            speichern();
        };

        ortBox.appendChild(ortLabel);
        ortBox.appendChild(ortInput);

        infoGrid.appendChild(datumBox);
        infoGrid.appendChild(ortBox);

        const uploadBox = document.createElement("div");
        uploadBox.className = "upload-box";

        const uploadLabel = document.createElement("label");
        uploadLabel.textContent = "Bilder hochladen";

        const upload = document.createElement("input");
        upload.type = "file";
        upload.accept = "image/*";
        upload.multiple = true;

        upload.addEventListener("change", async ()=>{
            for (const file of upload.files) {
                const response = await fetch("/api/upload", {
                    method: "POST",
                    headers: {
                        "x-filename": file.name
                    },
                    body: file
                });

                const data = await response.json();

                daten[index].bilder.push(data.url);
                await speichern();
                render();
            }
        });

        uploadBox.appendChild(uploadLabel);
        uploadBox.appendChild(upload);

        const bilderDiv = document.createElement("div");
        bilderDiv.className = "bilder";

        daten[index].bilder.forEach((bild,i)=>{

            const container = document.createElement("div");
            container.className = "bild-container";

            const img = document.createElement("img");
            img.src = bild;

            img.onclick = ()=>{
                document.getElementById("grossesBild").src = bild;
                document.getElementById("lightbox").style.display = "flex";
            };

            const del = document.createElement("button");
            del.className = "loeschen";
            del.innerHTML = "√Ч";

            del.onclick = (e)=>{
                e.stopPropagation();
                daten[index].bilder.splice(i,1);
                speichern();
                render();
            };

            container.appendChild(img);
            container.appendChild(del);
            bilderDiv.appendChild(container);
        });

        details.appendChild(infoGrid);
        details.appendChild(uploadBox);
        details.appendChild(bilderDiv);

        kopf.onclick = ()=>{
            const istOffen = details.style.display === "block";
            details.style.display = istOffen ? "none" : "block";
            pfeil.style.transform = istOffen ? "rotate(0deg)" : "rotate(180deg)";
        };

        box.appendChild(kopf);
        box.appendChild(details);

        liste.appendChild(box);
    });

    fortschrittAktualisieren();
}

document.getElementById("lightbox").onclick = ()=>{
    document.getElementById("lightbox").style.display = "none";
};

render();
laden();
</script>

</body>
</html>
